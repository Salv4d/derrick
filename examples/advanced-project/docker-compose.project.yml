version: '3.8'

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pass}
      POSTGRES_DB: ${DB_NAME:-derrick_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-derrick_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./api:/app
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://${DB_USER:-user}:${DB_PASSWORD:-pass}@database:5432/${DB_NAME:-derrick_db}
      REDIS_URL: redis://cache:6379
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    command: sh -c "npm install && npm start"

volumes:
  postgres_data:
