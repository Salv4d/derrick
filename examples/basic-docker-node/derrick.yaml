---
name: "basic-docker-node"
version: "1.0.0"

dependencies:
  nix_registry: "github:NixOS/nixpkgs/nixos-unstable"
  nix_packages:
    - "nodejs_20"
  docker_compose: "docker-compose.yml"

env:
  DATABASE_URL:
    description: "Connection string for the Redis database"
    required: false
    default: "redis://localhost:6379"

hooks:
  pre_start:
    - "echo '🚀 Starting NodeJS + Redis environment...'"
