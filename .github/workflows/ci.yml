name: CI

# Run on every push to main and on every opened/updated PR
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'website/**'
      - '**.md'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build (verify compilation)
        run: |
          go build -o /dev/null ./cmd/derrick

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        # v8 is the first action major that supports golangci-lint v2.x.
        # Pin to a release built with go1.25 so it can load a go1.25 go.mod.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          args: --timeout=5m
