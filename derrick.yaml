name: "derrick"
version: "0.1.0"

# "auto" picks Docker if a compose file is present, otherwise Nix.
provider: nix

nix:
  registry: "github:NixOS/nixpkgs/nixos-unstable"
  packages:
    - "go"
    - "golangci-lint"
    - "gofumpt"

hooks:
  setup:
    - run: "echo 'Checking dependencies...'"
      when: always
    - run: "go mod download"
      when: first-setup
  after_start:
    - run: "echo 'Environment is ready!'"
      when: always
  after_stop:
    - run: "echo 'Goodbye!'"
      when: always

flags:
  reset:
    description: "Rebuild the Nix environment from scratch"

validations:
  - name: "Go Compiler"
    command: "go version"
  - name: "Linter"
    command: "golangci-lint --version"
