name: "derrick"
version: "0.1.0"
dependencies:
  nix_registry: "github:NixOS/nixpkgs/nixos-unstable"
  nix_packages:
    - "go"
    - "golangci-lint"
  docker_compose: "docker-compose.yml"

env:
  GITHUB_TOKEN:
    description: "Personal Access Token for GitHub API"
    required: true
    validation: "curl -s -o /dev/null -I -H \"Authorization: token $GITHUB_TOKEN\" https://api.github.com/user"
  DATABASE_URL:
    description: "Connection string for the PostgreSQL database"
    required: false

hooks:
  pre_init:
    - "echo '🔍 Checking dependencies...'"
  post_init:
    - "go mod download"
  pre_start:
    - "echo '🚀 Starting development environment...'"
  post_start:
    - "echo '✨ Environment is ready!'"
  post_stop: 
    - "echo '👋 Environment stopped.'"

validations:
  - name: "Go Modules"
    command: "ls go.mod"
  - name: "Linting"
    command: "golangci-lint --version"
