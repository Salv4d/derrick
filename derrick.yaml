---
name: "derrick"
version: "0.1.0"

dependencies:
  nix_registry: "github:NixOS/nixpkgs/nixos-unstable"
  nix_packages:
    - "go"
    - "golangci-lint"
    - "gofumpt"

hooks:
  pre_init:
    - "echo '🔍 Checking dependencies...'"
  post_init:
    - "go mod download"
  pre_start:
    - "echo '🚀 Starting development environment...'"
  post_start:
    - "echo '✨ Environment is ready! (Hint: Run derrick shell to develop islation)'"

validations:
  - name: "Go Compiler"
    command: "go version"
  - name: "Linter"
    command: "golangci-lint --version"
