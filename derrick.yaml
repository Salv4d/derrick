name: "my-awesome-project"
version: "1.0.0"
dependencies:
  nix_packages:
    - "cowsay"
  docker_file: "docker-compose.yaml"
hooks:
  pre_init: "cowsay 'Hello from inside the Nix Bubble!'"
  post_init: "echo 'Setting up local folders...' && mkdir -p tmp/cache"
  post_start: |
    echo 'Running fake database migrations...'
    for i in {1..3}; do
      echo "  -> Migrating table $i..."
      sleep 1
    done
  post_stop: |
      echo 'Cleaning up temporary files...'
      rm -rf tmp/cache
      echo 'Done! Have a great day.'
validations:
  - name: "Check cowsay is available"
    command: "which cowsay"
  - name: "Check if .env exists"
    command: "test -f .env"
    auto_fix: "echo 'APP_MODE=local' > .env"
