name: "my-awesome-project"
version: "1.0.0"
dependencies:
  nix_registry: "github:NixOS/nixpkgs/nixos-22.11"
  nix_packages:
    - "cowsay"
    - "python310"
  docker_file: "docker-compose.yml"
hooks:
  pre_init:
    - "echo 'Step 1: Fetching credentials...'"
    - "sleep 1"
    - "cowsay 'Step 2: Mooing from Nix!'"
  post_init:
    - "echo 'Setting up local folders...' && mkdir -p tmp/cache"
  post_start:
    - |
      echo 'Running fake database migrations...'
      for i in {1..3}; do
        echo "  -> Migrating table $i..."
        sleep 1
      done
    - "echo 'Seeding database...'"
  post_stop: 
    - |
      echo 'Cleaning up temporary files...'
      rm -rf tmp/cache
      echo 'Done! Have a great day.'
validations:
  - name: "Check cowsay is available"
    command: "which cowsay"
  - name: "Check if .env exists"
    command: "test -f .env"
    auto_fix: "echo 'APP_MODE=local' > .env"
