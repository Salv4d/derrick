name: "my-awesome-project"
version: "1.0.0"
dependencies:
  nix_packages:
    - "go"
    - "nodejs_20"
  docker_file: "docker-compose.yaml"
hooks:
  pre_init: "echo 'Preparing environment...'"
  post_start: "echo 'Environment is ready!'"
validations:
  - name: "Check if .env exists"
    command: "test -f .env"
    auto_fix: "echo 'APP_MODE=local' > .env"
  - name: "Check Node version"
    command: "node -v | grep v20"