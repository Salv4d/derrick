{{define "index.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Derrick Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.2/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --border:     #2a2d3a;
      --text:       #e2e4ed;
      --muted:      #6b7080;
      --accent:     #7c6af7;
      --green:      #3ecf8e;
      --green-dim:  #1a3d2e;
      --red:        #f26d6d;
      --red-dim:    #3d1a1a;
      --gray:       #4a4f60;
      --gray-dim:   #1e2030;
      --radius:     6px;
      --font:       -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
    }

    header .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--accent);
    }

    header .subtitle {
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(124, 106, 247, 0.04); }

    td {
      padding: 14px 16px;
      vertical-align: middle;
    }

    .col-name   { font-weight: 600; color: var(--text); min-width: 160px; }
    .col-provider { color: var(--muted); font-size: 13px; }
    .col-uptime   { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .col-actions  { white-space: nowrap; }

    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-running { background: var(--green-dim); color: var(--green); }
    .badge-stopped { background: var(--red-dim);   color: var(--red);   }
    .badge-unknown { background: var(--gray-dim);  color: var(--gray);  }

    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.85; }

    .btn-start { background: var(--green);  color: #0a1a12; }
    .btn-stop  { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }

    .spinner {
      display: none;
      margin-left: 8px;
      color: var(--accent);
      font-size: 16px;
      animation: spin 1s linear infinite;
    }

    .htmx-request .spinner { display: inline-block; }
    .htmx-request .btn     { opacity: 0.4; pointer-events: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">◈ Derrick</span>
    <span class="subtitle">Dashboard — auto-refreshing every 4s</span>
  </header>

  <main>
    <p class="section-title">Projects</p>

    {{if .}}
    <table>
      <thead>
        <tr>
          <th>Project</th>
          <th>Provider</th>
          <th>Status</th>
          <th>Up for</th>
          <th>Actions</th>
        </tr>
      </thead>
      {{template "tbody" .}}
    </table>
    {{else}}
    <div class="empty">
      No projects loaded. Pass project directories to <code>derrick serve</code>.
    </div>
    {{end}}
  </main>

  <footer>
    Derrick · <a href="https://github.com/Salv4d/derrick" style="color:inherit">github.com/Salv4d/derrick</a>
  </footer>
</body>
</html>
{{end}}
