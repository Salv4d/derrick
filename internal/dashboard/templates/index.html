{{define "index.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Derrick Dashboard</title>
  <script src="https://unpkg.com/htmx.org@2.0.2/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #14161f;
      --border:    #2a2d3a;
      --text:      #e2e4ed;
      --muted:     #6b7080;
      --accent:    #7c6af7;
      --green:     #3ecf8e;
      --green-dim: #1a3d2e;
      --red:       #f26d6d;
      --red-dim:   #3d1a1a;
      --amber:     #f5a623;
      --amber-dim: #3d2a0a;
      --gray:      #4a4f60;
      --gray-dim:  #1e2030;
      --radius:    6px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono:      "SF Mono", "Fira Code", "Consolas", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 13px; }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main { padding: 32px; max-width: 1000px; margin: 0 auto; }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Table ───────────────────────────────────────────────────────────── */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    thead th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover:not(.detail-row) { background: rgba(124,106,247,0.04); }
    td { padding: 13px 16px; vertical-align: middle; }

    .col-name     { font-weight: 600; min-width: 180px; }
    .col-provider { color: var(--muted); font-size: 13px; }
    .col-uptime   { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
    .col-actions  { white-space: nowrap; }

    /* ── Expand button ───────────────────────────────────────────────────── */
    .expand-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 3px;
      margin-right: 4px;
      transition: color 0.15s, background 0.15s;
      vertical-align: middle;
    }
    .expand-btn:hover { color: var(--text); background: var(--border); }

    /* ── Status badge ────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-running { background: var(--green-dim); color: var(--green); }
    .badge-stopped { background: var(--red-dim);   color: var(--red);   }
    .badge-unknown { background: var(--gray-dim);  color: var(--gray);  }

    /* ── Action buttons ──────────────────────────────────────────────────── */
    .action-btns { display: inline-flex; align-items: center; gap: 8px; }
    .btn {
      padding: 5px 13px;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.82; }
    .btn-start { background: var(--green);    color: #0a1a12; }
    .btn-stop  { background: var(--red-dim);  color: var(--red); border: 1px solid #5a2222; }
    .btn-flag  { background: var(--gray-dim); color: var(--muted); border: 1px solid var(--border); font-size: 11px; padding: 4px 10px; }
    .btn-flag:hover { color: var(--text); }

    /* ── Spinner (HTMX indicator) ────────────────────────────────────────── */
    /*
     * HTMX 2 adds the `htmx-request` class directly to the element named in
     * `hx-indicator` — NOT to an ancestor. So the selector must be
     * `.htmx-indicator.htmx-request`, not `.htmx-request .htmx-indicator`.
     * The button itself also gets `htmx-request` which we use to grey it out.
     */
    .htmx-indicator {
      opacity: 0;
      transition: opacity 200ms ease-in;
      color: var(--accent);
    }
    .htmx-indicator.htmx-request { opacity: 1; }

    .spin-icon {
      width: 15px;
      height: 15px;
      display: block;
      animation: spin 0.8s linear infinite;
    }

    /* Grey out and disable the button while its request is in flight */
    .btn.htmx-request { opacity: 0.45; pointer-events: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error message ───────────────────────────────────────────────────── */
    .error-msg {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--red-dim);
      border: 1px solid #5a2222;
      border-radius: var(--radius);
      color: var(--red);
      font-size: 12px;
      max-width: 420px;
    }
    .error-msg pre {
      font-family: var(--mono);
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 0;
    }
    .error-msg svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Detail row ──────────────────────────────────────────────────────── */
    .detail-row { display: none; }
    .detail-row.open { display: table-row; }
    .detail-cell { padding: 0 !important; background: var(--surface2); }

    .detail-panel { padding: 16px 20px 20px 20px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section:last-child { margin-bottom: 0; }

    .detail-heading {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .detail-table {
      width: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 12px;
    }
    .detail-table thead th {
      font-size: 10px;
      padding: 7px 12px;
    }
    .detail-table td { padding: 8px 12px; }
    .detail-table tbody tr:hover { background: none; }

    .container-name   { font-family: var(--mono); font-size: 12px; }
    .container-image  { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .container-status { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 5px; }

    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }

    .detail-empty { color: var(--muted); font-size: 13px; font-style: italic; }

    /* ── Flag list ───────────────────────────────────────────────────────── */
    .flag-list { display: flex; flex-direction: column; gap: 6px; }
    .flag-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .flag-info  { display: flex; flex-direction: column; gap: 2px; }
    .flag-name  { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    .flag-desc  { font-size: 12px; color: var(--muted); }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 48px; color: var(--muted); }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
    footer a { color: inherit; }
  </style>
</head>
<body>
  <header>
    <span class="logo">◈ Derrick</span>
    <span class="subtitle">Dashboard</span>
  </header>

  <main>
    <p class="section-title">Projects</p>

    {{if .}}
    <table>
      <thead>
        <tr>
          <th>Project</th>
          <th>Provider</th>
          <th>Status</th>
          <th>Up for</th>
          <th>Actions</th>
        </tr>
      </thead>
      {{template "tbody" .}}
    </table>
    {{else}}
    <div class="empty">
      No projects loaded. Pass project directories to <code>derrick serve</code>.
    </div>
    {{end}}
  </main>

  <footer>
    Derrick · <a href="https://github.com/Salv4d/derrick">github.com/Salv4d/derrick</a>
  </footer>

  <script>
    function toggleDetail(name, btn) {
      const row = document.getElementById('detail-' + name);
      const isOpen = row.classList.contains('open');

      if (isOpen) {
        row.classList.remove('open');
        btn.textContent = '▶';
      } else {
        row.classList.add('open');
        btn.textContent = '▼';
        // Load detail content via HTMX on every open so data is always fresh.
        htmx.ajax('GET', '/projects/' + name + '/detail', {
          target: '#detail-cell-' + name,
          swap: 'innerHTML'
        });
      }
    }
  </script>
</body>
</html>
{{end}}
