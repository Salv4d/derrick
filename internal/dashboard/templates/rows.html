{{define "tbody"}}
<tbody id="projects-rows"
       hx-get="/rows"
       hx-trigger="every 4s"
       hx-swap="outerHTML">
  {{range .}}{{template "row" .}}{{end}}
</tbody>
{{end}}

{{define "row"}}
<tr id="row-{{.Name}}">
  <td class="col-name">{{.Name}}</td>
  <td class="col-provider">{{.Provider}}</td>
  <td class="col-status">
    <span class="badge {{.StatusClass}}">{{.Status}}</span>
  </td>
  <td class="col-uptime">{{if .StartedAt}}{{.StartedAt}}{{else}}—{{end}}</td>
  <td class="col-actions">
    {{if eq .Status "running"}}
      <button class="btn btn-stop"
              hx-post="/projects/{{.Name}}/stop"
              hx-target="#row-{{.Name}}"
              hx-swap="outerHTML"
              hx-indicator="#spinner-{{.Name}}">
        Stop
      </button>
    {{else}}
      <button class="btn btn-start"
              hx-post="/projects/{{.Name}}/start"
              hx-target="#row-{{.Name}}"
              hx-swap="outerHTML"
              hx-indicator="#spinner-{{.Name}}">
        Start
      </button>
    {{end}}
    <span id="spinner-{{.Name}}" class="htmx-indicator spinner">⟳</span>
  </td>
</tr>
{{end}}
